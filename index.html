<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTXNESIA News Studio - V6 Fix Scaling</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
        }

        /* Area Preview Sticky (Freeze di atas) */
        .preview-section {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #020617;
            padding: 10px;
            border-bottom: 1px solid #1e293b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* Container Pembungkus agar Scaling Tidak Memotong Gambar */
        #preview-container {
            position: relative;
            width: 100%;
            max-width: 600px; /* Batas lebar di desktop agar tidak terlalu besar */
            margin: 0 auto;
            background: #000;
            border-radius: 8px;
            overflow: hidden; /* Potong overflow hanya di level container luar */
            border: 1px solid #334155;
            display: block;
        }

        /* Kanvas Utama yang di-Scale */
        #render-canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            background: #000;
            transform-origin: top left;
        }

        .bg-photo {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .news-overlay {
            position: relative;
            z-index: 10;
            display: none; 
            width: fit-content;    
            box-sizing: border-box;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        /* Area Kontrol (Scrollable) */
        .control-section {
            padding: 15px;
            padding-bottom: 120px; /* Ruang untuk tombol simpan */
        }

        .card-control {
            background: #0f172a;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #1e293b;
        }

        .headline-text {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 0.5px;
            margin: 0;
            line-height: 0.95;
            white-space: pre-wrap;
            display: block;
        }

        .branding-row {
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 2px solid currentColor;
            padding-top: 8px;
            margin-top: 10px;
            width: fit-content;
        }

        .brand-name { font-weight: 900; font-size: 22px; letter-spacing: -0.5px; }

        .logo-layer {
            position: absolute;
            z-index: 20;
            display: none;
            pointer-events: none;
        }
        .logo-layer img { height: 100%; width: auto; object-fit: contain; }

        .label-ui { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        .theme-select {
            width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s;
        }
        .theme-select.active { border-color: #3b82f6; transform: scale(1.1); }

        .align-btn {
            background: #1e293b;
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            flex: 1;
        }
        .align-btn.active { background: #3b82f6; }

        .theme-dark { background: rgba(0,0,0,0.85); color: #ffffff; }
        .theme-crimson { background: rgba(153,27,27,0.92); color: #ffffff; }
        .theme-ocean { background: rgba(12,74,110,0.92); color: #ffffff; }
        .theme-paper { background: rgba(248,250,252,0.95); color: #0f172a; }

        /* Floating Save Button */
        .save-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(transparent, #020617 30%);
            z-index: 1001;
        }

        .btn-save-main {
            background: #22c55e;
            color: white;
            font-weight: 900;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            border: none;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }
    </style>
</head>
<body>

<div class="main-app">
    <!-- Area Preview (STAY ON TOP) -->
    <div class="preview-section">
        <div class="d-flex justify-content-between align-items-center mb-1">
            <span class="fw-black text-danger" style="font-size: 12px;">GTXNESIA STUDIO</span>
            <span id="info-status" class="text-secondary" style="font-size: 10px;">MENUNGGU FOTO...</span>
        </div>
        <div id="preview-container">
            <div id="render-canvas">
                <!-- Foto -->
                <img id="view-bg" class="bg-photo" src="" style="display:none;">
                
                <!-- Logo -->
                <div id="view-logo-container" class="logo-layer">
                    <img id="view-logo-img" src="">
                </div>

                <!-- Box Teks -->
                <div id="view-box" class="news-overlay theme-dark">
                    <h2 id="view-headline" class="headline-text"></h2>
                    <div id="view-branding" class="branding-row">
                        <span class="brand-name">GTXNESIA.ID</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Area Kontrol (SCROLLABLE) -->
    <div class="control-section">
        <div class="card-control">
            <div class="mb-3">
                <label class="label-ui">Upload Media</label>
                <div class="row g-2">
                    <div class="col-6">
                        <button onclick="document.getElementById('in-bg').click()" class="btn btn-primary btn-sm w-100 fw-bold">PILIH FOTO</button>
                        <input type="file" id="in-bg" accept="image/*" class="d-none">
                    </div>
                    <div class="col-6">
                        <button onclick="document.getElementById('in-logo').click()" class="btn btn-outline-light btn-sm w-100 fw-bold">LOGO PNG</button>
                        <input type="file" id="in-logo" accept="image/*" class="d-none">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="label-ui">Headline Teks</label>
                <textarea id="in-text" class="form-control bg-dark text-white border-secondary" rows="3" placeholder="Masukkan berita di sini..."></textarea>
            </div>

            <div class="mb-3">
                <label class="label-ui">Penyelarasan & Warna</label>
                <div class="d-flex gap-1 mb-2">
                    <button onclick="setAlign('flex-start')" id="btn-left" class="align-btn active">KIRI</button>
                    <button onclick="setAlign('center')" id="btn-center" class="align-btn">TENGAH</button>
                    <button onclick="setAlign('flex-end')" id="btn-right" class="align-btn">KANAN</button>
                </div>
                <div class="d-flex gap-2">
                    <div onclick="changeTheme('dark')" id="dot-dark" class="theme-select theme-dark active"></div>
                    <div onclick="changeTheme('crimson')" id="dot-crimson" class="theme-select theme-crimson"></div>
                    <div onclick="changeTheme('ocean')" id="dot-ocean" class="theme-select theme-ocean"></div>
                    <div onclick="changeTheme('paper')" id="dot-paper" class="theme-select theme-paper"></div>
                </div>
            </div>

            <div class="row g-3 pt-2 border-top border-secondary">
                <div class="col-6">
                    <label class="label-ui">Ukuran Font (<span id="txt-size">70</span>)</label>
                    <input type="range" id="rng-size" min="20" max="250" value="70" class="form-range">
                </div>
                <div class="col-6">
                    <label class="label-ui">Lebar Box (<span id="txt-width">90</span>%)</label>
                    <input type="range" id="rng-width" min="10" max="100" value="90" class="form-range">
                </div>
                <div class="col-6">
                    <label class="label-ui">Margin Bawah (<span id="txt-bottom">40</span>)</label>
                    <input type="range" id="rng-bottom" min="0" max="500" value="40" class="form-range">
                </div>
                <div class="col-6">
                    <label class="label-ui">Margin Samping (<span id="txt-side">40</span>)</label>
                    <input type="range" id="rng-side" min="0" max="500" value="40" class="form-range">
                </div>
                <div class="col-6">
                    <label class="label-ui">Padding Box (<span id="txt-pad">40</span>)</label>
                    <input type="range" id="rng-pad" min="10" max="150" value="40" class="form-range">
                </div>
                <div class="col-6">
                    <label class="label-ui">Transparansi (<span id="txt-alpha">0.8</span>)</label>
                    <input type="range" id="rng-alpha" min="0.1" max="1" step="0.1" value="0.8" class="form-range">
                </div>
            </div>
        </div>
    </div>

    <!-- Tombol Simpan -->
    <div class="save-container">
        <button onclick="saveResult()" id="btn-save" class="btn-save-main">SIMPAN KE GALERI</button>
    </div>
</div>

<script>
    let canvasW = 1080, canvasH = 1080;
    let selectedTheme = 'dark';
    let currentAlign = 'flex-start';

    // Handler Unggah Foto
    document.getElementById('in-bg').onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                canvasW = this.width;
                canvasH = this.height;
                const canvas = document.getElementById('render-canvas');
                
                // Set ukuran asli canvas
                canvas.style.width = canvasW + "px";
                canvas.style.height = canvasH + "px";
                
                document.getElementById('view-bg').src = event.target.result;
                document.getElementById('view-bg').style.display = 'block';
                document.getElementById('info-status').innerText = `${canvasW}x${canvasH} PX`;
                
                // Update Max Sliders
                document.getElementById('rng-bottom').max = canvasH / 2;
                document.getElementById('rng-side').max = canvasW / 2;
                
                refreshLayout();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    // Handler Logo
    document.getElementById('in-logo').onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('view-logo-img').src = event.target.result;
            document.getElementById('view-logo-container').style.display = 'block';
            refreshLayout();
        };
        reader.readAsDataURL(file);
    };

    function setAlign(val) {
        currentAlign = val;
        document.querySelectorAll('.align-btn').forEach(btn => btn.classList.remove('active'));
        if(val === 'flex-start') document.getElementById('btn-left').classList.add('active');
        if(val === 'center') document.getElementById('btn-center').classList.add('active');
        if(val === 'flex-end') document.getElementById('btn-right').classList.add('active');
        refreshLayout();
    }

    function changeTheme(t) {
        selectedTheme = t;
        const themes = ['dark', 'crimson', 'ocean', 'paper'];
        themes.forEach(item => {
            document.getElementById('view-box').classList.remove(`theme-${item}`);
            document.getElementById(`dot-${item}`).classList.remove('active');
        });
        document.getElementById('view-box').classList.add(`theme-${t}`);
        document.getElementById(`dot-${t}`).classList.add('active');
        refreshLayout();
    }

    function refreshLayout() {
        // Ambil Nilai Input
        const textInput = document.getElementById('in-text').value.toUpperCase();
        const fontSize = document.getElementById('rng-size').value;
        const alpha = document.getElementById('rng-alpha').value;
        const pad = parseInt(document.getElementById('rng-pad').value);
        const side = parseInt(document.getElementById('rng-side').value);
        const bottom = parseInt(document.getElementById('rng-bottom').value);
        const boxWidth = parseInt(document.getElementById('rng-width').value);

        // Update Label Teks UI
        document.getElementById('txt-size').innerText = fontSize;
        document.getElementById('txt-alpha').innerText = alpha;
        document.getElementById('txt-pad').innerText = pad;
        document.getElementById('txt-side').innerText = side;
        document.getElementById('txt-bottom').innerText = bottom;
        document.getElementById('txt-width').innerText = boxWidth;

        const canvas = document.getElementById('render-canvas');
        const headline = document.getElementById('view-headline');
        const box = document.getElementById('view-box');
        const branding = document.getElementById('view-branding');
        const logoContainer = document.getElementById('view-logo-container');

        // Tampilkan/Sembunyikan Box
        box.style.display = (textInput.trim() === "") ? "none" : "block";
        headline.innerText = textInput;

        // Penyelarasan Canvas
        canvas.style.alignItems = currentAlign;

        // Penyelarasan Box & Margin
        if(currentAlign === 'center') {
            headline.style.textAlign = 'center';
            branding.style.margin = '10px auto 0 auto';
            box.style.marginLeft = "0px";
            box.style.marginRight = "0px";
        } else if(currentAlign === 'flex-end') {
            headline.style.textAlign = 'right';
            branding.style.margin = '10px 0 0 auto';
            box.style.marginRight = side + "px";
            box.style.marginLeft = "0px";
        } else {
            headline.style.textAlign = 'left';
            branding.style.margin = '10px auto 0 0';
            box.style.marginLeft = side + "px";
            box.style.marginRight = "0px";
        }

        // Font & Spasi
        headline.style.fontSize = fontSize + "px";
        box.style.padding = `${pad}px`;
        box.style.marginBottom = bottom + "px"; 
        box.style.maxWidth = boxWidth + "%";
        
        // Warna Tema
        const colors = {
            dark: `rgba(0,0,0,${alpha})`,
            crimson: `rgba(153,27,27,${alpha})`,
            ocean: `rgba(12,74,110,${alpha})`,
            paper: `rgba(248,250,252,${alpha})`
        };
        box.style.backgroundColor = colors[selectedTheme];

        // Logo
        logoContainer.style.height = (canvasH * 0.08) + "px";
        logoContainer.style.top = "40px";
        logoContainer.style.left = "40px";

        // FIX LOGIC SCALING: Hitung Skala & Update Tinggi Kontainer
        const container = document.getElementById('preview-container');
        const scale = container.offsetWidth / canvasW;
        
        canvas.style.transform = `scale(${scale})`;
        container.style.height = (canvasH * scale) + "px"; // Mengunci tinggi kontainer agar tidak bug
    }

    function saveResult() {
        const canvas = document.getElementById('render-canvas');
        if(!document.getElementById('view-bg').src) return alert("Pilih foto dulu!");
        
        const btn = document.getElementById('btn-save');
        btn.innerText = "SEDANG MERENDER...";
        btn.disabled = true;

        const originalTransform = canvas.style.transform;
        canvas.style.transform = "none";

        html2canvas(canvas, {
            width: canvasW,
            height: canvasH,
            scale: 1,
            useCORS: true,
            allowTaint: true
        }).then(cv => {
            const link = document.createElement('a');
            link.download = `GTXNEWS-${Date.now()}.png`;
            link.href = cv.toDataURL("image/png");
            link.click();
            
            canvas.style.transform = originalTransform;
            btn.innerText = "SIMPAN KE GALERI";
            btn.disabled = false;
        }).catch(e => {
            alert("Error: Gagal merender gambar.");
            canvas.style.transform = originalTransform;
            btn.innerText = "SIMPAN KE GALERI";
            btn.disabled = false;
        });
    }

    // Event Listeners
    document.querySelectorAll('input, textarea').forEach(el => el.oninput = refreshLayout);
    window.onresize = refreshLayout;
    
    // Initial Run
    refreshLayout();
</script>
</body>
</html>
