<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Box Maker Pro - Bootstrap Responsive</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@700&family=Roboto+Condensed:wght@700&display=swap');

        :root {
            --primary-color: #0d6efd;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Layout Responsif */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        @media (min-width: 992px) {
            .app-wrapper {
                flex-direction: row;
                height: calc(100vh - 56px);
                overflow: hidden;
            }
            .sidebar {
                width: 400px;
                overflow-y: auto;
                border-right: 1px solid #dee2e6;
                background: white;
            }
            .preview-area {
                flex: 1;
                background: #1a1d20;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem;
                overflow: hidden;
            }
        }

        /* Mobile View Specifics */
        @media (max-width: 991.98px) {
            .sidebar {
                order: 2;
                padding: 1rem;
            }
            .preview-area {
                order: 1;
                height: 350px;
                background: #1a1d20;
                position: sticky;
                top: 0;
                z-index: 1020;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 10px;
                border-bottom: 4px solid var(--primary-color);
            }
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: #000;
        }

        /* Theme Grid */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .theme-item {
            aspect-ratio: 1/1;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 900;
            transition: all 0.2s;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        .theme-item:hover { transform: translateY(-2px); }
        .theme-item.active {
            border-color: var(--primary-color);
            transform: scale(1.1);
            z-index: 1;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
        }

        .section-title {
            font-size: 0.7rem;
            font-weight: 800;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #eee;
        }

        #empty-prompt {
            color: #6c757d;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-black d-flex align-items-center" href="#">
                <span class="badge bg-primary me-2">G</span> GTX NEWS <span class="text-primary ms-1">PRO</span>
            </a>
            <button id="btnDownload" class="btn btn-primary btn-sm fw-bold px-3">
                SIMPAN GAMBAR
            </button>
        </div>
    </nav>

    <div class="app-wrapper">
        <!-- PREVIEW (Top on Mobile, Right on Desktop) -->
        <div class="preview-area">
            <canvas id="mainCanvas"></canvas>
            <div id="empty-prompt">Pilih Foto Background</div>
        </div>

        <!-- SIDEBAR (Bottom on Mobile, Left on Desktop) -->
        <div class="sidebar p-3 p-lg-4">
            
            <!-- Media Upload -->
            <div class="mb-4">
                <h6 class="section-title">1. Unggah Media</h6>
                <div class="row g-2">
                    <div class="col-6">
                        <label class="form-label small fw-bold mb-1">Background</label>
                        <input type="file" id="bgInput" accept="image/*" class="form-control form-control-sm">
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold mb-1">Logo Media</label>
                        <input type="file" id="logoInput" accept="image/*" class="form-control form-control-sm">
                    </div>
                </div>
            </div>

            <!-- Content -->
            <div class="mb-4">
                <h6 class="section-title">2. Isi Konten</h6>
                <div class="mb-2">
                    <input type="text" id="inpLabel" value="GTXNESIA.ID" class="form-control form-control-sm fw-bold" placeholder="Label Media">
                </div>
                <textarea id="inpHeadline" rows="3" class="form-control form-control-sm fw-bold" placeholder="Headline Berita">Masyarakat Antusias Menyambut Era Baru Transformasi Digital 2026</textarea>
            </div>

            <!-- Themes Grid -->
            <div class="mb-4">
                <h6 class="section-title">3. Tema (20 Pilihan)</h6>
                <div id="themeContainer" class="theme-grid">
                    <!-- Themes generated by JS -->
                </div>
            </div>

            <!-- Adjustments -->
            <div class="mb-4">
                <h6 class="section-title">4. Pengaturan</h6>
                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label small fw-bold mb-1">Ukuran Teks</label>
                        <input type="range" id="rangeSize" class="form-range" min="30" max="130" value="65">
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold mb-1">Margin Box</label>
                        <input type="range" id="rangeMargin" class="form-range" min="0" max="100" value="40">
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold mb-1">Posisi Box</label>
                        <select id="inpPos" class="form-select form-select-sm fw-bold">
                            <option value="bottom">Bawah</option>
                            <option value="top">Atas</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold mb-1">Ukuran Logo</label>
                        <input type="range" id="rangeLogo" class="form-range" min="50" max="350" value="130">
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const emptyPrompt = document.getElementById('empty-prompt');

        let imgBg = null;
        let imgLogo = null;

        // 20 Professional Themes
        const themes = [
            { id: 1, name: "Dark", bg: "#000000", text: "#ffffff", label: "#ff0000", op: 0.9, radius: 0, font: "Inter" },
            { id: 2, name: "Glass", bg: "#ffffff", text: "#000000", label: "#0d6efd", op: 0.7, radius: 25, font: "Inter" },
            { id: 3, name: "Red", bg: "#dc3545", text: "#ffffff", label: "#ffffff", op: 1, radius: 0, font: "Oswald" },
            { id: 4, name: "Cyber", bg: "#000000", text: "#00f2ff", label: "#ff00ea", op: 0.85, radius: 0, font: "Oswald" },
            { id: 5, name: "Eco", bg: "#198754", text: "#ffffff", label: "#aff1d1", op: 0.9, radius: 15, font: "Inter" },
            { id: 6, name: "Navy", bg: "#0d2451", text: "#ffffff", label: "#ffc107", op: 0.9, radius: 8, font: "Roboto Condensed" },
            { id: 7, name: "Pure", bg: "#ffffff", text: "#212529", label: "#dc3545", op: 0.98, radius: 10, font: "Inter" },
            { id: 8, name: "Sport", bg: "#ffc107", text: "#000000", label: "#000000", op: 1, radius: 0, font: "Oswald" },
            { id: 9, name: "Rose", bg: "#fce7f3", text: "#9d174d", label: "#db2777", op: 0.9, radius: 30, font: "Inter" },
            { id: 10, name: "Slate", bg: "#343a40", text: "#f8f9fa", label: "#0d6efd", op: 0.75, radius: 20, font: "Inter" },
            { id: 11, name: "Orange", bg: "#fd7e14", text: "#ffffff", label: "#000000", op: 1, radius: 0, font: "Oswald" },
            { id: 12, name: "Coffee", bg: "#422006", text: "#fef3c7", label: "#ffc107", op: 0.9, radius: 8, font: "Inter" },
            { id: 13, name: "Sky", bg: "#0dcaf0", text: "#ffffff", label: "#055160", op: 0.85, radius: 20, font: "Inter" },
            { id: 14, name: "Concrete", bg: "#6c757d", text: "#ffffff", label: "#212529", op: 0.9, radius: 0, font: "Roboto Condensed" },
            { id: 15, name: "Purple", bg: "#6f42c1", text: "#ffffff", label: "#e0cffc", op: 0.9, radius: 50, font: "Inter" },
            { id: 16, name: "Forest", bg: "#14532d", text: "#dcfce7", label: "#4ade80", op: 0.9, radius: 12, font: "Inter" },
            { id: 17, name: "Crimson", bg: "#7f1d1d", text: "#fee2e2", label: "#f87171", op: 0.9, radius: 8, font: "Inter" },
            { id: 18, name: "Monochrome", bg: "#ffffff", text: "#000000", label: "#000000", op: 0.4, radius: 0, font: "Inter", border: true },
            { id: 19, name: "Glass Dark", bg: "#000000", text: "#ffffff", label: "#ffffff", op: 0.4, radius: 15, font: "Inter", border: true },
            { id: 20, name: "Night", bg: "#0a0a0a", text: "#0d6efd", label: "#ffffff", op: 0.9, radius: 25, font: "Oswald" }
        ];

        let activeTheme = themes[0];

        function initThemes() {
            const container = document.getElementById('themeContainer');
            themes.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = `theme-item ${i === 0 ? 'active' : ''}`;
                div.style.backgroundColor = t.bg;
                div.style.color = t.text;
                div.innerText = "ABC";
                div.onclick = () => {
                    document.querySelectorAll('.theme-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    activeTheme = t;
                    render();
                };
                container.appendChild(div);
            });
        }

        function hexToRgb(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16),
                g = parseInt(hex.slice(3, 5), 16),
                b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function render() {
            if (!imgBg) {
                emptyPrompt.style.display = 'block';
                canvas.style.display = 'none';
                return;
            }
            emptyPrompt.style.display = 'none';
            canvas.style.display = 'block';

            // Set Resolusi Asli
            canvas.width = imgBg.width;
            canvas.height = imgBg.height;
            const scale = canvas.width / 1080;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);

            const label = document.getElementById('inpLabel').value.toUpperCase();
            const headline = document.getElementById('inpHeadline').value;
            const hSize = parseInt(document.getElementById('rangeSize').value) * scale;
            const margin = parseInt(document.getElementById('rangeMargin').value) * scale;
            const pos = document.getElementById('inpPos').value;
            const logoSize = parseInt(document.getElementById('rangeLogo').value) * scale;
            const padding = 50 * scale;

            const boxWidth = canvas.width - (margin * 2);
            const textWidth = boxWidth - (padding * 2);

            // Wrap Text Calculation
            ctx.font = `bold ${hSize}px ${activeTheme.font}, sans-serif`;
            const words = headline.split(' ');
            const lines = [];
            let currentLine = '';
            for(let n=0; n<words.length; n++) {
                let test = currentLine + words[n] + ' ';
                if(ctx.measureText(test).width > textWidth && n > 0) {
                    lines.push(currentLine);
                    currentLine = words[n] + ' ';
                } else { currentLine = test; }
            }
            lines.push(currentLine);

            const labelSize = hSize * 0.4;
            const headHeight = lines.length * (hSize * 1.2);
            const boxHeight = headHeight + (label ? labelSize * 1.8 : 0) + (padding * 2);
            let boxY = (pos === 'top') ? margin : (canvas.height - margin - boxHeight);

            // DRAW BOX
            ctx.fillStyle = hexToRgb(activeTheme.bg, activeTheme.op);
            const radius = (activeTheme.radius || 0) * scale;
            ctx.beginPath();
            if(ctx.roundRect) ctx.roundRect(margin, boxY, boxWidth, boxHeight, radius);
            else ctx.rect(margin, boxY, boxWidth, boxHeight);
            ctx.fill();

            if(activeTheme.border) {
                ctx.strokeStyle = activeTheme.text;
                ctx.lineWidth = 2 * scale;
                ctx.stroke();
            }

            // DRAW TEXT
            let textY = boxY + padding;
            ctx.textBaseline = 'top';

            if(label) {
                ctx.font = `900 ${labelSize}px ${activeTheme.font}, sans-serif`;
                ctx.fillStyle = activeTheme.label;
                ctx.fillText(label, margin + padding, textY);
                textY += labelSize * 1.6;
            }

            ctx.font = `bold ${hSize}px ${activeTheme.font}, sans-serif`;
            ctx.fillStyle = activeTheme.text;
            lines.forEach(l => {
                ctx.fillText(l.trim(), margin + padding, textY);
                textY += hSize * 1.2;
            });

            // DRAW LOGO
            if(imgLogo) {
                const ratio = imgLogo.height / imgLogo.width;
                const lw = logoSize;
                const lh = lw * ratio;
                const lx = margin;
                const ly = (pos === 'top') ? (canvas.height - margin - lh) : margin;
                ctx.drawImage(imgLogo, lx, ly, lw, lh);
            }
        }

        // File Helpers
        function setupFile(id, cb) {
            document.getElementById(id).onchange = (e) => {
                const f = e.target.files[0];
                if(!f) return;
                const r = new FileReader();
                r.onload = (ev) => {
                    const i = new Image();
                    i.onload = () => { cb(i); render(); };
                    i.src = ev.target.result;
                };
                r.readAsDataURL(f);
            };
        }

        setupFile('bgInput', i => imgBg = i);
        setupFile('logoInput', i => imgLogo = i);

        // Events
        ['inpLabel', 'inpHeadline', 'rangeSize', 'rangeMargin', 'inpPos', 'rangeLogo'].forEach(id => {
            document.getElementById(id).oninput = render;
        });

        document.getElementById('btnDownload').onclick = () => {
            if(!imgBg) return;
            const link = document.createElement('a');
            link.download = `News-GTX-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        };

        window.onload = () => {
            initThemes();
            render();
        };
    </script>
</body>
</html>
